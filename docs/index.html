<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Survival Manager Web</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Student Survival Manager</p>
        <h1>Fully Functional Web App</h1>
      </div>
      <div class="top-actions">
        <button id="clearDataBtn" class="ghost">Clear All Data</button>
        <a class="ghost" href="https://github.com/senpaiii-glitch69/StudentSurvivalManager" target="_blank" rel="noreferrer">GitHub</a>
      </div>
    </header>

    <section class="metrics" id="metrics"></section>

    <nav class="tabs" aria-label="Sections">
      <button class="tab is-active" data-tab="expenses">Expenses</button>
      <button class="tab" data-tab="assignments">Assignments</button>
      <button class="tab" data-tab="events">Events</button>
    </nav>

    <section class="panel is-active" id="expenses-panel">
      <div class="card">
        <h2>Add Expense</h2>
        <form id="expenseForm" class="grid-form">
          <input name="name" placeholder="Expense name" required />
          <input name="amount" type="number" min="1" placeholder="Amount" required />
          <select name="category">
            <option>Food</option>
            <option>Transport</option>
            <option>Books</option>
            <option>Entertainment</option>
            <option>Health</option>
            <option>Other</option>
          </select>
          <button class="primary" type="submit">Add</button>
        </form>
      </div>
      <div class="card">
        <h2>Expense List</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Name</th><th>Category</th><th>Amount</th><th></th></tr>
            </thead>
            <tbody id="expensesBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="panel" id="assignments-panel">
      <div class="card">
        <h2>Add Assignment</h2>
        <form id="assignmentForm" class="grid-form">
          <input name="name" placeholder="Assignment title" required />
          <input name="date" type="date" required />
          <select name="priority">
            <option>High</option>
            <option selected>Medium</option>
            <option>Low</option>
          </select>
          <button class="primary" type="submit">Add</button>
        </form>
      </div>
      <div class="card">
        <h2>Assignments</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Title</th><th>Due Date</th><th>Priority</th><th>Status</th><th></th></tr>
            </thead>
            <tbody id="assignmentsBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="panel" id="events-panel">
      <div class="card">
        <h2>Add Event</h2>
        <form id="eventForm" class="grid-form">
          <input name="title" placeholder="Event title" required />
          <input name="date" type="date" required />
          <input name="location" placeholder="Location" required />
          <button class="primary" type="submit">Add</button>
        </form>
      </div>
      <div class="card">
        <h2>Events</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Title</th><th>Date</th><th>Location</th><th>Status</th><th></th></tr>
            </thead>
            <tbody id="eventsBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
